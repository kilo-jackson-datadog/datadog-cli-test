name: Test Datadog Security CLI

on:
  workflow_dispatch:

jobs:
  test-cli:
    runs-on: ubuntu-latest
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: ${{ secrets.DD_SITE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates

      - name: Add Datadog APT repo
        run: |
          DD_APT_KEY_URL="https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public"
          curl -fsSL "$DD_APT_KEY_URL" | sudo gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable datadog-security-cli" | sudo tee /etc/apt/sources.list.d/datadog-security-cli.list

      - name: Install Datadog Security CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y datadog-security-cli

      - name: Verify CLI
        run: |
          which datadog-security-cli
          datadog-security-cli version

      - name: Pull nginx image
        run: |
          docker pull nginx:1.25

      - name: Scan image and send results to Datadog
        run: |
          datadog-security-cli image nginx:1.25
